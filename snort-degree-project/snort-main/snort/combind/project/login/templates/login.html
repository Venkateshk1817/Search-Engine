{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="card">
    <h1 style="margin-bottom: 2rem; font-size: 2rem; font-weight: 600;">Login</h1>
    <form method="POST" action="{{ url_for('login.login') }}">
        <div class="form-group">
            <label class="form-label" for="username">Username</label>
            <input class="form-input" type="text" id="username" name="username" required>
        </div>
        <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input class="form-input" type="password" id="password" name="password" required>
        </div>
        <button type="submit" class="btn btn-primary">Login</button>
    </form>
    <p style="margin-top: 1.5rem; font-size: 0.9rem;">
        Don't have an account? <a href="{{ url_for('login.register') }}" style="color: var(--accent-color); text-decoration: none;">Register here</a>
    </p>
</div>
{% endblock %}
