{% extends "base.html" %}

{% block title %}Register{% endblock %}

{% block content %}
<div class="card">
    <h1 style="margin-bottom: 2rem; font-size: 2rem; font-weight: 600;">Register</h1>
    <form method="POST" action="{{ url_for('login.register') }}">
        <div class="form-group">
            <label class="form-label" for="username">Username</label>
            <input class="form-input" type="text" id="username" name="username" required>
        </div>
        <div class="form-group">
            <label class="form-label" for="email">Email</label>
            <input class="form-input" type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input class="form-input" type="password" id="password" name="password" required>
        </div>
        <div class="form-group">
            <label class="form-label" for="confirm_password">Confirm Password</label>
            <input class="form-input" type="password" id="confirm_password" name="confirm_password" required>
        </div>
        <button type="submit" class="btn btn-primary">Register</button>
    </form>
    <p style="margin-top: 1.5rem; font-size: 0.9rem;">
        Already have an account? <a href="{{ url_for('login.login') }}" style="color: var(--accent-color); text-decoration: none;">Login here</a>
    </p>
</div>
{% endblock %}
