{% extends "base.html" %}

{% block title %}Profile{% endblock %}

{% block content %}
<div class="card">
    <h1 style="margin-bottom: 2rem; font-size: 2rem; font-weight: 600;">Profile</h1>
    
    <div style="margin-bottom: 2rem;">
        <h2 style="margin-bottom: 1rem; font-size: 1.5rem;">Account Information</h2>
        <p style="margin-bottom: 0.5rem;"><strong>Username:</strong> {{ username }}</p>
        <p style="margin-bottom: 0.5rem;"><strong>Email:</strong> {{ email }}</p>
    </div>

    <div>
        <h2 style="margin-bottom: 1rem; font-size: 1.5rem;">Change Password</h2>
        <form method="POST" action="{{ url_for('search.profile') }}">
            <div class="form-group">
                <label class="form-label" for="current_password">Current Password</label>
                <input class="form-input" type="password" id="current_password" name="current_password" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="new_password">New Password</label>
                <input class="form-input" type="password" id="new_password" name="new_password" required>
            </div>
            <button type="submit" class="btn btn-primary">Update Password</button>
        </form>
    </div>

    {% if error %}
        <div class="alert alert-error" style="margin-top: 1rem;">
            {{ error }}
        </div>
    {% endif %}

    {% if success %}
        <div class="alert alert-success" style="margin-top: 1rem;">
            {{ success }}
        </div>
    {% endif %}
</div>
{% endblock %}
